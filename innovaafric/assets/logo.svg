<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 100" width="400" height="100">
  <!-- Background pill (light blue) -->
  <rect width="400" height="100" rx="16" fill="#e8f6fd"/>

  <!-- Icon rounded square -->
  <rect x="8" y="8" width="84" height="84" rx="18" fill="#29ABE2"/>

  <!-- Globe with network -->
  <!-- Globe circle -->
  <circle cx="50" cy="50" r="24" fill="none" stroke="white" stroke-width="3"/>
  <!-- Latitude lines -->
  <ellipse cx="50" cy="50" rx="24" ry="10" fill="none" stroke="white" stroke-width="2"/>
  <line x1="26" y1="50" x2="74" y2="50" stroke="white" stroke-width="2"/>
  <!-- Longitude center -->
  <ellipse cx="50" cy="50" rx="10" ry="24" fill="none" stroke="white" stroke-width="2"/>
  <!-- Network nodes -->
  <circle cx="50" cy="26" r="4" fill="white"/>
  <circle cx="26" cy="50" r="4" fill="white"/>
  <circle cx="74" cy="50" r="4" fill="white"/>
  <circle cx="50" cy="74" r="4" fill="white"/>
  <circle cx="32" cy="32" r="3" fill="white" opacity="0.7"/>
  <circle cx="68" cy="32" r="3" fill="white" opacity="0.7"/>
  <circle cx="32" cy="68" r="3" fill="white" opacity="0.7"/>
  <circle cx="68" cy="68" r="3" fill="white" opacity="0.7"/>
  <!-- Connection lines to nodes -->
  <line x1="50" y1="26" x2="32" y2="32" stroke="white" stroke-width="1.5" opacity="0.6"/>
  <line x1="50" y1="26" x2="68" y2="32" stroke="white" stroke-width="1.5" opacity="0.6"/>
  <line x1="50" y1="74" x2="32" y2="68" stroke="white" stroke-width="1.5" opacity="0.6"/>
  <line x1="50" y1="74" x2="68" y2="68" stroke="white" stroke-width="1.5" opacity="0.6"/>

  <!-- Text block -->
  <text x="102" y="42" font-family="Arial Black, Arial, sans-serif" font-size="26" font-weight="900">
    <tspan fill="#1a2744">Innova</tspan><tspan fill="#29ABE2">AFRIC</tspan>
  </text>
  <text x="102" y="62" font-family="Arial, sans-serif" font-size="14" fill="#333" opacity="0.8">We Simplify Life</text>
  <text x="102" y="80" font-family="Arial, sans-serif" font-size="11" fill="#29ABE2" letter-spacing="2">FINTECH · AFRICA</text>
</svg>
