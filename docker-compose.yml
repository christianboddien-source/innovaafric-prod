# ═══════════════════════════════════════════════════════════════════════════
#  InnovaAFRIC — despliegue en el servidor de IONOS
#
#  Punto de partida para cuando el servidor esté activo. Arranca las webs
#  estáticas y el proxy de AliExpress. La base de datos NO está aquí a
#  propósito: Supabase se mueve al final, y con backups montados antes.
#
#  Uso:
#    cp services/aliexpress-proxy/.env.example .env   # y rellenar
#    docker compose up -d
#
#  ⚠ El archivo .env NO se sube a Git (ya está en .gitignore).
# ═══════════════════════════════════════════════════════════════════════════

services:

  # ── Webs estáticas ──────────────────────────────────────────────────────
  # Sirve xendershop, xenderbigshop, xendermoney, xenderdelivery e innovaafric
  # desde el propio repo. Sustituye a GitHub Pages / Netlify.
  web:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./:/srv:ro
      - caddy_data:/data      # certificados TLS: si se pierde, se re-emiten
      - caddy_config:/config
    # Sin depends_on del proxy: las webs son estáticas y no lo necesitan para
    # arrancar. Caddy levanta igual aunque el proxy no esté; solo daría error
    # si alguien pega en /api/aliexpress/*, que aún no se usa.

  # ── Proxy de AliExpress ─────────────────────────────────────────────────
  # En el profile "ai": NO arranca con `docker compose up -d` (necesita las
  # claves de AliExpress, que aún no hay). Cuando estén, se levanta con:
  #   docker compose --profile ai up -d
  aliexpress-proxy:
    build: ./services/aliexpress-proxy
    profiles: ["ai"]
    restart: unless-stopped
    environment:
      PORT: 3000
      AE_APP_KEY: ${AE_APP_KEY}
      AE_APP_SECRET: ${AE_APP_SECRET}
      AE_TRACKING_ID: ${AE_TRACKING_ID:-}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-https://www.xendershop.com,https://xendershop.com}
      CACHE_TTL_MS: ${CACHE_TTL_MS:-600000}
    # Sin `ports:` a propósito: solo Caddy habla con él, no se expone a
    # internet directamente.
    expose:
      - "3000"

volumes:
  caddy_data:
  caddy_config:
