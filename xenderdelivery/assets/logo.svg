<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 100" width="420" height="100">
  <!-- Background pill -->
  <rect width="420" height="100" rx="16" fill="#1a2744"/>

  <!-- Icon rounded square -->
  <rect x="8" y="8" width="84" height="84" rx="18" fill="#0f1a30"/>

  <!-- Truck icon (simplified, orange) -->
  <!-- Cargo box -->
  <rect x="20" y="42" width="40" height="28" rx="4" fill="#F5A623"/>
  <!-- Cab -->
  <path d="M 60 46 L 78 46 L 82 56 L 82 70 L 60 70 Z" fill="#F5A623"/>
  <!-- Cab window -->
  <path d="M 63 50 L 77 50 L 80 58 L 63 58 Z" fill="#1a2744" opacity="0.5"/>
  <!-- Wheels -->
  <circle cx="33" cy="72" r="8" fill="#1a2744" stroke="#F5A623" stroke-width="2.5"/>
  <circle cx="33" cy="72" r="3" fill="#F5A623"/>
  <circle cx="68" cy="72" r="8" fill="#1a2744" stroke="#F5A623" stroke-width="2.5"/>
  <circle cx="68" cy="72" r="3" fill="#F5A623"/>
  <!-- Speed lines -->
  <line x1="14" y1="48" x2="26" y2="48" stroke="#F5A623" stroke-width="3" stroke-linecap="round"/>
  <line x1="14" y1="56" x2="24" y2="56" stroke="#F5A623" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="14" y1="63" x2="22" y2="63" stroke="#F5A623" stroke-width="2" stroke-linecap="round"/>

  <!-- Text block -->
  <!-- Brand name -->
  <text x="108" y="42" font-family="Arial Black, Arial, sans-serif" font-size="26" font-weight="900">
    <tspan fill="#F5A623">Xender</tspan><tspan fill="white">Delivery</tspan>
  </text>
  <!-- Slogan -->
  <text x="108" y="62" font-family="Arial, sans-serif" font-size="14" fill="white" opacity="0.8">We Simplify Life</text>
  <!-- Tagline -->
  <text x="108" y="80" font-family="Arial, sans-serif" font-size="11" fill="#F5A623" letter-spacing="2" opacity="0.9">FAST · SAFE · RELIABLE</text>
</svg>
