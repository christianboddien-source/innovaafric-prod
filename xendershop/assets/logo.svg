<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 100" width="400" height="100">
  <!-- Background pill (teal) -->
  <rect width="400" height="100" rx="16" fill="#e0f5f2"/>

  <!-- Icon rounded square (teal) -->
  <rect x="8" y="8" width="84" height="84" rx="18" fill="#00897B"/>

  <!-- Phone + cart icon -->
  <!-- Phone -->
  <rect x="20" y="28" width="28" height="46" rx="5" fill="white" opacity="0.2"/>
  <rect x="20" y="28" width="28" height="46" rx="5" fill="none" stroke="white" stroke-width="2.5"/>
  <rect x="26" y="68" width="16" height="3" rx="1.5" fill="white" opacity="0.5"/>
  <!-- Small screen content -->
  <rect x="24" y="35" width="20" height="3" rx="1.5" fill="white" opacity="0.5"/>
  <rect x="24" y="41" width="14" height="3" rx="1.5" fill="white" opacity="0.5"/>

  <!-- Cart (right of phone, orange) -->
  <g transform="translate(48, 32)">
    <path d="M 2 0 L 28 0 L 24 22 L 6 22 Z" fill="#F5A623"/>
    <path d="M 2 0 L -4 -10" stroke="#F5A623" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="8" cy="27" r="5" fill="#F5A623"/>
    <circle cx="8" cy="27" r="2.5" fill="#00897B"/>
    <circle cx="20" cy="27" r="5" fill="#F5A623"/>
    <circle cx="20" cy="27" r="2.5" fill="#00897B"/>
  </g>

  <!-- Text block -->
  <text x="102" y="42" font-family="Arial Black, Arial, sans-serif" font-size="26" font-weight="900">
    <tspan fill="#00897B">Xender</tspan><tspan fill="#F5A623">Shop</tspan>
  </text>
  <text x="102" y="62" font-family="Arial, sans-serif" font-size="14" fill="#333" opacity="0.8">We Simplify Life</text>
  <text x="102" y="80" font-family="Arial, sans-serif" font-size="11" fill="#00897B" letter-spacing="2">SHOP · DELIVER · ENJOY</text>
</svg>
