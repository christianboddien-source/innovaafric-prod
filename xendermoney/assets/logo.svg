<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 100" width="400" height="100">
  <!-- Background pill -->
  <rect width="400" height="100" rx="16" fill="#1a2744"/>

  <!-- Icon rounded square -->
  <rect x="8" y="8" width="84" height="84" rx="18" fill="#0f1a30"/>

  <!-- Phone icon -->
  <rect x="28" y="28" width="36" height="52" rx="6" fill="#F5A623" opacity="0.15"/>
  <rect x="28" y="28" width="36" height="52" rx="6" fill="none" stroke="#F5A623" stroke-width="3"/>
  <rect x="35" y="35" width="22" height="32" rx="3" fill="#F5A623" opacity="0.2"/>
  <rect x="37" y="72" width="18" height="4" rx="2" fill="#F5A623" opacity="0.6"/>
  <!-- Dollar on screen -->
  <text x="44" y="57" font-family="Arial Black, sans-serif" font-size="16" font-weight="900" fill="#F5A623" text-anchor="middle">$</text>
  <!-- Arrow right -->
  <line x1="66" y1="54" x2="80" y2="54" stroke="#F5A623" stroke-width="3" stroke-linecap="round"/>
  <polygon points="76,49 83,54 76,59" fill="#F5A623"/>

  <!-- Text block -->
  <text x="102" y="42" font-family="Arial Black, Arial, sans-serif" font-size="26" font-weight="900">
    <tspan fill="#F5A623">Xender</tspan><tspan fill="white">Money</tspan>
  </text>
  <text x="102" y="62" font-family="Arial, sans-serif" font-size="14" fill="white" opacity="0.8">We Simplify Life</text>
  <text x="102" y="80" font-family="Arial, sans-serif" font-size="11" fill="#F5A623" letter-spacing="2" opacity="0.9">SEND · RECEIVE · PAY</text>
</svg>
